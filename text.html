<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang phân tích URL</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; }
    .box { background: #f4f4f4; padding: 10px; font-family: monospace; }
    li { margin: 8px 0; font-family: monospace; }
    li strong { font-family: sans-serif; }
  </style>
</head>
<body>

  <h2>Phân Tích URL</h2>
  <p>URL Mẫu:</p>
  <div class="box">https://example.com/products/list?page=2#top</div>

  <h3>Các thành phần:</h3>
  <ul>
    <li><strong>Protocol:</strong> https</li>
    <li><strong>Domain:</strong> example.com</li>
    <li><strong>Path:</strong> /products/list</li>
    <li><strong>Query:</strong> page=2</li>
    <li><strong>Fragment:</strong> top</li>
  </ul>

  </body>
</html>
