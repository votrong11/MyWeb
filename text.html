<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>So sánh Domain, Hosting, URL</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 10px 14px; text-align: left; }
    th { background: #f0f0eb; font-weight: 600; }
    tr:nth-child(even) { background: #fafafa; }
  </style>
</head>
<body>
  <h1>So sánh Domain, Hosting, URL</h1>

  <table>
    <thead>
      <tr>
        <th>Khái niệm</th>
        <th>Là gì</th>
        <th>Ví dụ</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><strong>Domain</strong></td>
        <td>Tên địa chỉ của website trên Internet</td>
        <td>example.com</td>
      </tr>
      <tr>
        <td><strong>Hosting</strong></td>
        <td>Máy chủ lưu trữ các file của website</td>
        <td>Server chứa HTML, CSS, hình ảnh...</td>
      </tr>
      <tr>
        <td><strong>URL</strong></td>
        <td>Địa chỉ đầy đủ để truy cập một tài nguyên cụ thể</td>
        <td>https://example.com/products/list?page=2#top</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
