<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS nổi bật thành phần URL</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    p { font-family: monospace; font-size: 16px; }
    .protocol { background: #B5D4F4; color: #0C447C; padding: 2px 6px; border-radius: 4px; }
    .domain   { background: #9FE1CB; color: #085041; padding: 2px 6px; border-radius: 4px; }
    .path     { background: #CECBF6; color: #3C3489; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Tô nổi bật thành phần URL</h1>

  <p>
    <span class="protocol">https:</span>//<span class="domain">example.com</span><span class="path">/products/list</span>?page=2#top
  </p>
</body>
</html>
